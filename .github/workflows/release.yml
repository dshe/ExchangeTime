name: Tag, Build & Release

on:
  workflow_dispatch:   # run manually, or trigger on merges to main

jobs:
  tag-build-release:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0   # important so tags can be pushed

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Read version from csproj
        id: get_version
        shell: pwsh
        run: |
          [xml]$proj = Get-Content "ExchangeTime/ExchangeTime.csproj"
          $version = $proj.Project.PropertyGroup.Version
          echo "version=$version" >> $env:GITHUB_OUTPUT
      
      - name: Create Git tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag v${{ steps.get_version.outputs.version }}
          git push origin v${{ steps.get_version.outputs.version }}

      - name: Build executable
        run: dotnet publish ExchangeTime/ExchangeTime.csproj -c Release -r win-x64 --self-contained true -o ./publish

      - name: Zip publish folder
        run: |
          cd publish
          powershell Compress-Archive -Path * -DestinationPath ../ExchangeTime-${{ steps.get_version.outputs.version }}.zip

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.get_version.outputs.version }}
          generate_release_notes: true
          files: ./publish/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
