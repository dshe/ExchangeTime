name: .NET Build

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]
  workflow_dispatch:  # enable manual runs

jobs:
  build:
    runs-on: windows-latest  # use Windows runner

    steps:
    - name: Checkout repository
      uses: actions/checkout@v6

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: "10.0.x"

    - name: Restore dependencies
      run: dotnet restore ExchangeTime.slnx

    - name: Build solution
      run: dotnet build ExchangeTime.slnx --configuration Release --no-restore

#    - name: Run tests
#      run: dotnet test ExchangeTime.Tests/ExchangeTime.Tests.csproj --configuration Release --no-build --verbosity normal
